name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Vite는 .env.production 파일을 production 빌드 시 확실하게 읽음
      - name: Create demo environment file
        working-directory: frontend
        run: |
          printf 'VITE_USE_MOCK=true\nVITE_DEMO_MODE=true\nVITE_BASE_PATH=/EveryUp/\n' > .env.production

      - name: Build demo
        working-directory: frontend
        run: pnpm run build

      # GitHub Pages SPA 라우팅: 모든 경로에서 index.html을 서빙
      - name: Create 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
