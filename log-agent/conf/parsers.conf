[PARSER]
    name        try_json
    format      json
    time_key    time
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    time_keep   off

[PARSER]
    name        docker
    format      json
    time_key    time
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    time_keep   off

[PARSER]
    name        syslog
    format      regex
    regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.+)$
    time_key    time
    time_format %b %d %H:%M:%S
