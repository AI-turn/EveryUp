[SERVICE]
    flush           1
    daemon          off
    log_level       ${MT_LOG_LEVEL}
    parsers_file    /fluent-bit/etc/parsers.conf

[INPUT]
    name            tail
    path            ${MT_FILE}
    tag             mt.logs
    read_from_head  false
    refresh_interval 5
    rotate_wait     30
    skip_long_lines on
    db              /tmp/flb_tail.db
    parser          try_json

[FILTER]
    name            lua
    match           mt.logs
    script          /fluent-bit/etc/mt_transform.lua
    call            mt_transform

[OUTPUT]
    name            http
    match           mt.logs
    host            ${MT_HOST}
    port            ${MT_PORT}
    uri             /api/v1/logs/ingest
    format          json
    json_date_key   false
    header          Authorization Bearer ${MT_API_KEY}
    header          X-MT-Source agent
    header          Content-Type application/json
    tls             ${MT_TLS}
    tls.verify      ${MT_TLS_VERIFY}
    retry_limit     ${MT_RETRY_LIMIT}
