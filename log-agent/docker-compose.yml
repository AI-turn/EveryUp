services:
  mt-log-agent:
    image: aiturn/everyup-log-agent:latest
    restart: unless-stopped
    volumes:
      - ${LOG_PATH:-/var/log/app}:/var/log/app:ro
    ports:
      - "${MT_TEST_PORT:-8080}:${MT_TEST_PORT:-8080}"
    environment:
      - MT_ENDPOINT=${MT_ENDPOINT}
      - MT_API_KEY=${MT_API_KEY}
      - MT_FILE=${MT_FILE:-/var/log/app/*.log}
      - MT_LOG_LEVEL=${MT_LOG_LEVEL:-info}
      - MT_TEST=${MT_TEST:-false}
      - MT_TEST_PORT=${MT_TEST_PORT:-8080}
