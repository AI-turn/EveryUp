services:
  mt-monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt-monitoring
    ports:
      - "3001:3001"
    volumes:
      - mt-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mt-data:
    driver: local
